# fly.toml app configuration file generated for baseball-for-girls on 2026-03-18T09:13:36-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'baseball-for-girls'
primary_region = 'iad'

[build]

[env]
  DATABASE_PATH = '/data/fantasy.db'

[[mounts]]
  source = 'fantasy_db'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
