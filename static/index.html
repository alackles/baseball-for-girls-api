<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Baseball for Girls</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242736;
    --border: #2e3248;
    --accent: #e85d26;
    --accent2: #f0a500;
    --text: #e8eaf0;
    --muted: #7a7f9a;
    --green: #3ecf6e;
    --red: #e85d6e;
    --radius: 8px;
    --font: 'Georgia', serif;
    --mono: 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
  }

  /* ---- Header ---- */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 1.5rem;
    letter-spacing: 0.05em;
    color: var(--accent);
    text-transform: uppercase;
  }
  header h1 span { color: var(--text); }

  /* ---- Team bar ---- */
  #teamBar {
    background: var(--surface);
    border-bottom: 3px solid var(--my-team-color, var(--border));
    display: flex;
    justify-content: center;
    padding: 0.5rem 1.5rem;
    transition: border-color 0.3s;
  }
  #teamBarBtn {
    background: none;
    border: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 1.25rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.25rem 0.75rem;
    border-radius: var(--radius);
    transition: background 0.15s;
  }
  #teamBarBtn:hover { background: var(--surface2); }
  .team-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--my-team-color, var(--muted));
    display: inline-block;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  #teamPicker {
    position: absolute;
    top: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.75rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 0.5rem;
    min-width: 320px;
    max-width: 600px;
    z-index: 100;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  #teamPicker.hidden { display: none; }
  .team-pick-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 0.75rem;
    cursor: pointer;
    text-align: left;
    font-family: var(--font);
    color: var(--text);
    transition: border-color 0.15s, background 0.15s;
  }
  .team-pick-card:hover { background: var(--surface2); }
  .team-pick-card.selected { border-color: var(--my-team-color, var(--accent)); }
  .team-pick-name { font-size: 1rem; font-weight: bold; }
  .team-pick-owner { font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; }

  /* ---- Nav ---- */
  nav {
    display: flex;
    gap: 0.25rem;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    overflow-x: auto;
  }
  nav button {
    background: none;
    border: none;
    color: var(--muted);
    padding: 0.75rem 1.25rem;
    cursor: pointer;
    font-family: var(--font);
    font-size: 0.9rem;
    border-bottom: 3px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
  }
  nav button:hover { color: var(--text); }
  nav button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ---- Main layout ---- */
  main { padding: 1.5rem; max-width: 1200px; margin: 0 auto; }
  .view { display: none; }
  .view.active { display: block; }

  /* ---- Cards ---- */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .card h2 {
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  /* ---- Tables ---- */
  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  th {
    text-align: left;
    padding: 0.5rem 0.75rem;
    color: var(--muted);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-bottom: 1px solid var(--border);
    font-weight: normal;
  }
  td { padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  /* ---- Buttons ---- */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.45rem 1rem;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    font-family: var(--font);
    font-size: 0.85rem;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-sm { padding: 0.3rem 0.65rem; font-size: 0.78rem; }

  /* ---- Forms ---- */
  input[type="text"], input[type="number"], select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 0.45rem 0.75rem;
    font-family: var(--font);
    font-size: 0.9rem;
    outline: none;
    width: 100%;
  }
  input:focus, select:focus { border-color: var(--accent); }
  label { font-size: 0.82rem; color: var(--muted); display: block; margin-bottom: 0.25rem; }
  .field { margin-bottom: 0.75rem; }

  /* ---- Badges ---- */
  .badge {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 3px;
    font-size: 0.75rem;
    font-family: var(--mono);
    font-weight: bold;
    letter-spacing: 0.04em;
  }
  .badge-pos { background: #1e2d4a; color: #6ab0f5; }
  .badge-il  { background: #3a1a1a; color: var(--red); }
  .badge-chaos { background: #2a1f00; color: var(--accent2); }

  /* ---- Draft specific ---- */
  .draft-grid { display: grid; grid-template-columns: 1fr 380px; gap: 1rem; }
  @media (max-width: 900px) { .draft-grid { grid-template-columns: 1fr; } }

  .pick-clock {
    text-align: center;
    padding: 1.5rem;
    background: var(--surface2);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    margin-bottom: 1rem;
  }
  .pick-clock .team-name {
    font-size: 1.4rem;
    color: var(--accent);
    margin-bottom: 0.25rem;
  }
  .pick-clock .pick-label { color: var(--muted); font-size: 0.85rem; }
  .pick-clock .countdown {
    font-size: 2.5rem;
    font-family: var(--mono);
    color: var(--accent2);
    margin: 0.5rem 0;
  }
  .pick-clock .countdown.urgent { color: var(--red); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

  .player-search-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
  }
  .player-search-row input { flex: 1; min-width: 150px; }
  .player-search-row select { width: auto; }

  .player-list { max-height: 420px; overflow-y: auto; }
  .player-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid var(--border);
    gap: 0.5rem;
  }
  .player-item:hover { background: var(--surface2); }
  .player-item .player-name { flex: 1; font-size: 0.9rem; }
  .player-item .player-pos { width: 40px; text-align: center; }

  .pick-log { max-height: 300px; overflow-y: auto; }
  .pick-log-item {
    display: flex;
    gap: 0.75rem;
    padding: 0.4rem 0.5rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.82rem;
  }
  .pick-log-item .pick-num { color: var(--muted); font-family: var(--mono); min-width: 30px; }
  .pick-log-item .pick-team { color: var(--accent2); min-width: 100px; }
  .pick-log-item .auto-tag { color: var(--muted); font-size: 0.72rem; }

  /* ---- Queue manager ---- */
  .queue-list { max-height: 280px; overflow-y: auto; }
  .queue-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.4rem 0.5rem;
    border-bottom: 1px solid var(--border);
    cursor: grab;
    font-size: 0.85rem;
  }
  .queue-item:hover { background: var(--surface2); }
  .queue-item .drag-handle { color: var(--muted); cursor: grab; }
  .queue-item .q-rank { color: var(--muted); font-family: var(--mono); min-width: 24px; }

  /* ---- Standings ---- */
  .rank-1 td:first-child { color: var(--accent2); }
  .rank-2 td:first-child { color: #b0b0b0; }
  .rank-3 td:first-child { color: #cd7f32; }

  .sparkline {
    display: flex;
    gap: 2px;
    align-items: flex-end;
    height: 30px;
  }
  .sparkline-bar {
    width: 8px;
    background: var(--accent);
    border-radius: 2px 2px 0 0;
    opacity: 0.7;
    min-height: 2px;
  }

  /* ---- Trades ---- */
  .trade-window-banner {
    padding: 0.75rem 1rem;
    border-radius: var(--radius);
    margin-bottom: 1rem;
    font-size: 0.88rem;
  }
  .trade-window-open { background: #0d2a1a; border: 1px solid var(--green); color: var(--green); }
  .trade-window-closed { background: #1a0d0d; border: 1px solid var(--red); color: var(--red); }

  .trade-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    margin-bottom: 0.75rem;
  }
  .trade-card .trade-meta { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.5rem; }
  .trade-card .trade-players { display: flex; gap: 1rem; flex-wrap: wrap; }
  .trade-side { flex: 1; min-width: 140px; }
  .trade-side h4 { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; margin-bottom: 0.3rem; }

  .status-badge {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 3px;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .status-pending  { background: #2a2200; color: var(--accent2); }
  .status-accepted { background: #0d2a1a; color: var(--green); }
  .status-rejected { background: #1a0d0d; color: var(--red); }
  .status-executed { background: #0d1a2a; color: #6ab0f5; }

  /* ---- Roster view ---- */
  .roster-selector { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .roster-selector button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.4rem 0.9rem;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: var(--font);
    font-size: 0.85rem;
  }
  .roster-selector button.active { border-color: var(--accent); color: var(--accent); }

  /* ---- Settings ---- */
  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 600px) { .settings-grid { grid-template-columns: 1fr; } }

  /* ---- Utility ---- */
  .pts-pos { color: var(--green); }
  .pts-neg { color: var(--red); }
  .text-muted { color: var(--muted); font-size: 0.85rem; }
  .flex { display: flex; align-items: center; gap: 0.5rem; }
  .spacer { flex: 1; }
  .mt { margin-top: 0.75rem; }
  .loading { color: var(--muted); padding: 1.5rem; text-align: center; font-style: italic; }
  .error-msg { color: var(--red); font-size: 0.85rem; padding: 0.5rem; background: #1a0d0d;
               border-radius: var(--radius); margin-top: 0.5rem; }
</style>
</head>
<body>

<header>
  <h1 id="leagueTitle">⚾ <span>Baseball for Girls</span></h1>
</header>

<div id="teamBar">
  <button id="teamBarBtn" onclick="toggleTeamPicker()">
    <span class="team-dot" id="teamBarDot"></span>
    <span id="teamBarName">Select your team ▾</span>
  </button>
  <div id="teamPicker" class="hidden"></div>
</div>

<nav>
  <button class="active" onclick="showView('draft')">Draft Board</button>
  <button onclick="showView('standings')">Standings</button>
  <button onclick="showView('rosters')">Rosters</button>
  <button onclick="showView('trades')">Trades</button>
  <button onclick="showView('settings')">Settings</button>
</nav>

<main>

<!-- ===================== DRAFT VIEW ===================== -->
<div id="view-draft" class="view active">
  <div class="draft-grid">

    <!-- Left: player pool + pick submission -->
    <div>
      <div class="card">
        <h2>Player Pool</h2>
        <div class="player-search-row">
          <input type="text" id="playerSearch" placeholder="Search players..." oninput="searchPlayers()" />
          <select id="posFilter" onchange="searchPlayers()">
            <option value="">All Positions</option>
            <option>C</option><option>1B</option><option>2B</option>
            <option>3B</option><option>SS</option><option>OF</option>
            <option>SP</option><option>RP</option>
          </select>
          <label class="flex" style="white-space:nowrap; color:var(--muted)">
            <input type="checkbox" id="availableOnly" onchange="searchPlayers()" checked /> Available only
          </label>
        </div>
        <div class="player-list" id="playerList">
          <div class="loading">Search for players above</div>
        </div>
      </div>

      <div class="card" id="draftStatusCard">
        <h2>Pick Clock</h2>
        <div id="pickClockArea"><div class="loading">Loading draft state...</div></div>
      </div>
    </div>

    <!-- Right: pick log + queue -->
    <div>
      <div class="card">
        <h2>Recent Picks</h2>
        <div class="pick-log" id="pickLog"><div class="loading">—</div></div>
      </div>

      <div class="card">
        <h2>My Queue <span class="text-muted" style="text-transform:none;font-size:0.8rem">(autopick priority)</span></h2>
        <div class="player-search-row">
          <input type="text" id="queueSearch" placeholder="Add player to queue..." oninput="searchQueueAdd()" />
        </div>
        <div id="queueSearchResults" style="max-height:120px;overflow-y:auto;margin-bottom:0.5rem;"></div>
        <div class="queue-list" id="queueList"><div class="loading">No players queued</div></div>
        <button class="btn btn-secondary btn-sm mt" onclick="saveQueue()">Save Queue</button>
        <div id="queueMsg"></div>
      </div>
    </div>
  </div>
</div>

<!-- ===================== STANDINGS VIEW ===================== -->
<div id="view-standings" class="view">
  <div class="card">
    <h2>Season Standings</h2>
    <div id="standingsTable"><div class="loading">Loading...</div></div>
  </div>
</div>

<!-- ===================== ROSTERS VIEW ===================== -->
<div id="view-rosters" class="view">
  <div class="roster-selector" id="rosterSelector"></div>
  <div class="card">
    <h2 id="rosterTeamTitle">Select a team</h2>
    <div id="rosterTable"><div class="loading">—</div></div>
  </div>
  <!-- Free agent add section -->
  <div class="card" id="faCard" style="display:none">
    <h2>Add Free Agent</h2>
    <div class="player-search-row">
      <input type="text" id="faSearch" placeholder="Search available players..." oninput="searchFA()" />
      <select id="faPosFilter" onchange="searchFA()">
        <option value="">All Positions</option>
        <option>C</option><option>1B</option><option>2B</option>
        <option>3B</option><option>SS</option><option>OF</option>
        <option>SP</option><option>RP</option>
      </select>
    </div>
    <div id="faResults" style="max-height:240px;overflow-y:auto;"></div>
    <div id="faMsg"></div>
  </div>
</div>

<!-- ===================== TRADES VIEW ===================== -->
<div id="view-trades" class="view">
  <div id="tradeWindowBanner"></div>

  <div class="card" id="proposeCard">
    <h2>Propose a Trade</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
      <div>
        <div class="field">
          <label>My team</label>
          <select id="tradePropTeam" onchange="loadTradeRosters()">
            <option value="">—</option>
          </select>
        </div>
        <label style="margin-bottom:0.4rem">Players I'm offering</label>
        <div id="tradeOfferPool" style="max-height:180px;overflow-y:auto;"></div>
      </div>
      <div>
        <div class="field">
          <label>Their team</label>
          <select id="tradeRecvTeam" onchange="loadTradeRosters()">
            <option value="">—</option>
          </select>
        </div>
        <label style="margin-bottom:0.4rem">Players I want</label>
        <div id="tradeRequestPool" style="max-height:180px;overflow-y:auto;"></div>
      </div>
    </div>
    <div class="mt flex">
      <button class="btn btn-primary" onclick="submitTrade()">Propose Trade</button>
      <div id="tradeMsg" style="margin-left:0.75rem;font-size:0.85rem;"></div>
    </div>
  </div>

  <div class="card">
    <h2>Trade History</h2>
    <div id="tradeList"><div class="loading">Loading...</div></div>
  </div>
</div>

<!-- ===================== SETTINGS VIEW ===================== -->
<div id="view-settings" class="view">
  <div class="card" style="margin-bottom:1rem">
    <h2>Add Team</h2>
    <div class="field">
      <label>Team Name</label>
      <input type="text" id="newTeamName" placeholder="e.g. The Sluggers" />
    </div>
    <div class="field">
      <label>Owner Name</label>
      <input type="text" id="newTeamOwner" placeholder="e.g. Alex" />
    </div>
    <div class="field">
      <label>Team Color</label>
      <input type="color" id="newTeamColor" value="#e85d26" style="width:3rem;height:2rem;padding:0.1rem;cursor:pointer" />
    </div>
    <button class="btn btn-primary btn-sm" onclick="createTeam()">Add Team</button>
    <span id="newTeamMsg" style="margin-left:0.5rem;font-size:0.82rem;"></span>
  </div>
  <div class="settings-grid" id="settingsGrid">
    <div class="loading">Loading teams...</div>
  </div>
</div>

</main>

<script>
const BACKEND_URL = '';

// ============================================================
// State
// ============================================================
let state = {
  teams: [],
  myTeamId: parseInt(localStorage.getItem('myTeamId')) || null,
  draftState: null,
  draftPollInterval: null,
  queue: [],          // array of mlbam_ids in rank order
  queueDetails: [],   // full player objects matching queue
  selectedRosterTeam: null,
  tradeWindowOpen: false,
  offeringIds: new Set(),
  requestingIds: new Set(),
};

// ============================================================
// API helper
// ============================================================
async function api(path, opts = {}) {
  try {
    const res = await fetch(BACKEND_URL + '/api' + path, {
      headers: { 'Content-Type': 'application/json' },
      ...opts,
    });
    return await res.json();
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

// ============================================================
// Bootstrap
// ============================================================
async function init() {
  const data = await api('/league');
  if (!data.ok) { console.error(data.error); return; }
  state.teams = data.teams;
  document.getElementById('leagueTitle').innerHTML =
    `⚾ <span>${data.league_name}</span>`;
  renderTeamBar();
  updateTradeWindowBanner(data.trade_window);
  state.tradeWindowOpen = data.trade_window.open;

  // Start draft polling
  startDraftPoll();
  loadStandings();
  loadRosterSelector();
  loadTrades();
  loadSettings();
}

function renderTeamBar() {
  const picker = document.getElementById('teamPicker');
  picker.innerHTML = state.teams.map(t => `
    <button class="team-pick-card ${t.id === state.myTeamId ? 'selected' : ''}"
            style="border-color:${t.id === state.myTeamId ? t.color : ''}"
            onclick="onTeamChange(${t.id})">
      <div style="display:flex;align-items:center;gap:0.4rem;margin-bottom:0.2rem">
        <span style="width:10px;height:10px;border-radius:50%;background:${t.color};display:inline-block;flex-shrink:0"></span>
        <span class="team-pick-name">${esc(t.name)}</span>
      </div>
      <div class="team-pick-owner">${esc(t.owner)}</div>
    </button>
  `).join('');

  const team = state.teams.find(t => t.id === state.myTeamId);
  if (team) {
    document.getElementById('teamBarName').textContent = team.name + ' ▾';
    applyTeamColor(team.color);
  } else {
    document.getElementById('teamBarName').textContent = 'Select your team ▾';
    applyTeamColor(null);
  }
}

function applyTeamColor(color) {
  const root = document.documentElement;
  if (color) {
    root.style.setProperty('--my-team-color', color);
  } else {
    root.style.removeProperty('--my-team-color');
  }
  const dot = document.getElementById('teamBarDot');
  if (dot) dot.style.background = color || 'var(--muted)';
}

function toggleTeamPicker() {
  document.getElementById('teamPicker').classList.toggle('hidden');
}

function onTeamChange(teamId) {
  state.myTeamId = teamId || null;
  localStorage.setItem('myTeamId', state.myTeamId || '');
  document.getElementById('teamPicker').classList.add('hidden');
  renderTeamBar();
  loadQueueForMyTeam();
  refreshDraftUI();
}

// ============================================================
// View routing
// ============================================================
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  event.target.classList.add('active');

  if (name === 'standings') loadStandings();
  if (name === 'trades') loadTrades();
  if (name === 'settings') loadSettings();
}

// Draft
// ============================================================
function startDraftPoll() {
  refreshDraftUI();
  state.draftPollInterval = setInterval(refreshDraftUI, 10000);
}

async function refreshDraftUI() {
  const data = await api('/draft/state');
  if (!data.ok) return;
  state.draftState = data;
  renderPickClock(data);
  renderPickLog(data.pick_log || []);
}

function renderPickClock(data) {
  const el = document.getElementById('pickClockArea');
  if (data.status === 'complete') {
    el.innerHTML = '<div style="text-align:center;padding:1rem;color:var(--green)">✓ Draft Complete</div>';
    return;
  }
  if (data.status === 'pending') {
    el.innerHTML = '<div class="loading">Draft has not started yet.</div>';
    return;
  }
  const cp = data.current_pick;
  if (!cp) return;

  const isMyPick = state.myTeamId && cp.team_id === state.myTeamId;
  const secs = cp.time_remaining_seconds || 0;
  const urgent = secs < 3600;
  const timeStr = formatSeconds(secs);

  el.innerHTML = `
    <div class="pick-clock">
      <div class="pick-label">Round ${cp.round}, Pick ${cp.pick_in_round} (Overall #${cp.pick_number})</div>
      <div class="team-name">${cp.team_name}</div>
      <div class="countdown ${urgent ? 'urgent' : ''}">${timeStr}</div>
      <div class="text-muted">remaining</div>
    </div>
    ${isMyPick ? '<div style="text-align:center;color:var(--green);margin-bottom:0.5rem">⬆ It\'s your pick! Select a player above.</div>' : ''}
    <div style="text-align:center;color:var(--muted);font-size:0.8rem">${data.completed_picks} of ${data.total_picks} picks made</div>
  `;
}

function renderPickLog(log) {
  const el = document.getElementById('pickLog');
  if (!log.length) { el.innerHTML = '<div class="loading">No picks yet</div>'; return; }
  el.innerHTML = [...log].reverse().map(p => `
    <div class="pick-log-item">
      <span class="pick-num">#${p.pick_number}</span>
      <span class="pick-team">${p.team_name}</span>
      <span>${p.player_name || '—'}</span>
      <span class="badge badge-pos">${p.position || '?'}</span>
      ${p.autopicked ? '<span class="auto-tag">auto</span>' : ''}
    </div>
  `).join('');
}

function formatSeconds(s) {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m ${String(sec).padStart(2,'0')}s`;
  return `${sec}s`;
}

async function _doPlayerSearch() {

function renderPlayerList(players) {

async function draftPlayer(mlbamId, name) {
  if (!state.myTeamId) { alert('Select your team first.'); return; }

async function _doQueueSearch() {
  const q = document.getElementById('queueSearch').value.trim();
  if (q.length < 2) { document.getElementById('queueSearchResults').innerHTML = ''; return; }
  const data = await api(`/players/search?q=${encodeURIComponent(q)}&available_only=true`);

  el.innerHTML = data.players.slice(0, 8).map(p => `

     <span class="player-name">${p.name_full}</span>

    </div>

function addToQueue(mlbamId, name, pos) {
  if (state.queue.find(q => q.mlbam_id === mlbamId)) return;
  state.queue.push({ mlbam_id: mlbamId, name_full: name, position: pos });
  renderQueue();
}

function removeFromQueue(mlbamId) {
  state.queue = state.queue.filter(q => q.mlbam_id !== mlbamId);
  renderQueue();
}

function renderQueue() {
  const el = document.getElementById('queueList');
  if (!state.queue.length) { el.innerHTML = '<div class="loading">Queue is empty</div>'; return; }
  el.innerHTML = state.queue.map((p, i) => `
    <div class="queue-item" draggable="true" data-idx="${i}"
         ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="dragDrop(event)">
      <span class="drag-handle">⠿</span>
      <span class="q-rank">${i+1}</span>
      <span style="flex:1">${p.name_full}</span>
      <span class="badge badge-pos">${p.position || '?'}</span>
      <button class="btn btn-secondary btn-sm" onclick="removeFromQueue(${p.mlbam_id})">✕</button>
    </div>
  `).join('');
}

async function loadQueueForMyTeam() {
  if (!state.myTeamId) return;
  const data = await api(`/draft/queue/${state.myTeamId}`);
  if (!data.ok) return;
  state.queue = data.queue.map(q => ({
    mlbam_id: q.mlbam_id, name_full: q.name_full, position: q.position
  }));
  renderQueue();
}

async function saveQueue() {
  if (!state.myTeamId) { alert('Select your team first.'); return; }
  const ids = state.queue.map(q => q.mlbam_id);
  const res = await api(`/draft/queue/${state.myTeamId}`, {
    method: 'POST',
    body: JSON.stringify({ queue: ids }),
  });
  const msg = document.getElementById('queueMsg');
  msg.textContent = res.ok ? '✓ Queue saved' : '✗ ' + res.error;
  msg.style.color = res.ok ? 'var(--green)' : 'var(--red)';
  setTimeout(() => { msg.textContent = ''; }, 3000);
}

// Drag-to-reorder
let dragIdx = null;
function dragStart(e) { dragIdx = parseInt(e.currentTarget.dataset.idx); }
function dragOver(e) { e.preventDefault(); }
function dragDrop(e) {
  const targetIdx = parseInt(e.currentTarget.dataset.idx);
  if (dragIdx === null || dragIdx === targetIdx) return;
  const moved = state.queue.splice(dragIdx, 1)[0];
  state.queue.splice(targetIdx, 0, moved);
  dragIdx = null;
  renderQueue();
}

function updateTradeWindowBanner(tw) {
  const el = document.getElementById('tradeWindowBanner');
  if (tw.open) {
    el.innerHTML = `<div class="trade-window-banner trade-window-open">🟢 Trade window is open — closes ${tw.window_close}</div>`;
  } else {
    el.innerHTML = `<div class="trade-window-banner trade-window-closed">🔴 Trade window closed — opens ${tw.window_open}${tw.days_until_open > 0 ? ` (${tw.days_until_open} days)` : ''}</div>`;
  }
}

async function loadTrades() {
  const data = await api('/trades');
  if (!data.ok) return;
  updateTradeWindowBanner(data.window);
  state.tradeWindowOpen = data.window.open;

  // Toggle propose form
  const proposeCard = document.getElementById('proposeCard');
  proposeCard.style.opacity = state.tradeWindowOpen ? '1' : '0.5';
  proposeCard.querySelectorAll('button, select, input').forEach(el => {
    el.disabled = !state.tradeWindowOpen;
  });

  // Populate team dropdowns
  ['tradePropTeam', 'tradeRecvTeam'].forEach(id => {
    const sel = document.getElementById(id);
    const cur = sel.value;
    sel.innerHTML = '<option value="">—</option>';
    state.teams.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t.id; opt.textContent = t.name;
      sel.appendChild(opt);
    });
    sel.value = cur;
  });

  if (state.myTeamId) {
    document.getElementById('tradePropTeam').value = state.myTeamId;
    loadTradeRosters();
  }

  renderTradeList(data.trades || []);
}

async function loadTradeRosters() {
  const propId = parseInt(document.getElementById('tradePropTeam').value);
  const recvId = parseInt(document.getElementById('tradeRecvTeam').value);
  state.offeringIds = new Set();
  state.requestingIds = new Set();

  if (propId) {
    const data = await api('/roster/' + propId);
    renderTradePool('tradeOfferPool', data.roster || [], state.offeringIds);
  }
  if (recvId) {
    const data = await api('/roster/' + recvId);
    renderTradePool('tradeRequestPool', data.roster || [], state.requestingIds);
  }
}

function renderTradePool(elId, roster, selectedSet) {
  const el = document.getElementById(elId);
  if (!roster.length) { el.innerHTML = '<div class="loading">No players</div>'; return; }
  el.innerHTML = roster.map(p => `
    <div class="player-item" id="tp-${elId}-${p.mlbam_id}" onclick="toggleTradePlayer('${elId}', ${p.mlbam_id})"
         style="cursor:pointer;${selectedSet.has(p.mlbam_id)?'background:var(--surface2);border-left:3px solid var(--accent);':''}">
      <span class="player-name">${p.name_full}</span>
      <span class="badge badge-pos">${p.position || '?'}</span>
    </div>
  `).join('');
}

function toggleTradePlayer(poolId, mlbamId) {
  const set = poolId === 'tradeOfferPool' ? state.offeringIds : state.requestingIds;
  if (set.has(mlbamId)) set.delete(mlbamId);
  else set.add(mlbamId);
  const el = document.getElementById(`tp-${poolId}-${mlbamId}`);
  if (set.has(mlbamId)) {
    el.style.background = 'var(--surface2)';
    el.style.borderLeft = '3px solid var(--accent)';
  } else {
    el.style.background = '';
    el.style.borderLeft = '';
  }
}

async function submitTrade() {
  const propTeam = parseInt(document.getElementById('tradePropTeam').value);
  const recvTeam = parseInt(document.getElementById('tradeRecvTeam').value);
  const msg = document.getElementById('tradeMsg');

  if (!propTeam || !recvTeam) { msg.textContent = 'Select both teams.'; return; }
  if (propTeam === recvTeam) { msg.textContent = 'Cannot trade with yourself.'; return; }
  if (!state.offeringIds.size || !state.requestingIds.size) {
    msg.textContent = 'Select at least one player from each side.'; return;
  }

  const res = await api('/trades/propose', {
    method: 'POST',
    body: JSON.stringify({
      proposing_team: propTeam,
      receiving_team: recvTeam,
      offering: [...state.offeringIds],
      requesting: [...state.requestingIds],
    }),
  });

  msg.style.color = res.ok ? 'var(--green)' : 'var(--red)';
  msg.textContent = res.ok ? '✓ Trade proposed!' : '✗ ' + res.error;
  if (res.ok) loadTrades();
}

function renderTradeList(trades) {
  const el = document.getElementById('tradeList');
  if (!trades.length) { el.innerHTML = '<div class="loading">No trades yet</div>'; return; }
  el.innerHTML = trades.map(t => {
    const giving = t.players.filter(p => p.from_team === t.proposing_team_id);
    const getting = t.players.filter(p => p.to_team === t.proposing_team_id);
    return `
      <div class="trade-card">
        <div class="trade-meta flex">
          <span>${t.proposing_team_name} → ${t.receiving_team_name}</span>
          <span class="spacer"></span>
          <span class="status-badge status-${t.status}">${t.status}</span>
          <span style="margin-left:0.5rem;color:var(--muted);font-size:0.78rem">${t.proposed_at?.slice(0,10)}</span>
        </div>
        <div class="trade-players">
          <div class="trade-side">
            <h4>${t.proposing_team_name} gives</h4>
            ${t.players.filter(p => p.from_team_name === t.proposing_team_name)
              .map(p => `<div>${p.name_full} <span class="badge badge-pos">${p.position||'?'}</span></div>`).join('') || '—'}
          </div>
          <div style="align-self:center;color:var(--muted)">⇄</div>
          <div class="trade-side">
            <h4>${t.receiving_team_name} gives</h4>
            ${t.players.filter(p => p.from_team_name === t.receiving_team_name)
              .map(p => `<div>${p.name_full} <span class="badge badge-pos">${p.position||'?'}</span></div>`).join('') || '—'}
          </div>
        </div>
        ${t.status === 'pending' && state.myTeamId ?
          `<div class="mt flex">
            ${state.teams.find(tm => tm.id === state.myTeamId)?.name === t.receiving_team_name ? `
              <button class="btn btn-primary btn-sm" onclick="respondTrade(${t.id}, 'accept')">Accept</button>
              <button class="btn btn-danger btn-sm" onclick="respondTrade(${t.id}, 'reject')">Reject</button>
            ` : ''}
          </div>` : ''}
      </div>
    `;
  }).join('');
}

async function respondTrade(tradeId, action) {
  if (!state.myTeamId) return;
  const res = await api(`/trades/${tradeId}/${action}`, {
    method: 'POST', body: JSON.stringify({ team_id: state.myTeamId }),
  });
  if (!res.ok) { alert(res.error); return; }
  loadTrades();
}

async function createTeam() {
  const name = document.getElementById('newTeamName').value.trim();
  const owner = document.getElementById('newTeamOwner').value.trim();
  const msg = document.getElementById('newTeamMsg');
  const color = document.getElementById('newTeamColor').value;
  const res = await api('/teams', { method: 'POST', body: JSON.stringify({ name, owner, color }) });
  msg.style.color = res.ok ? 'var(--green)' : 'var(--red)';
  msg.textContent = res.ok ? '✓ Team added' : '✗ ' + res.error;
  if (res.ok) {
    document.getElementById('newTeamName').value = '';
    document.getElementById('newTeamOwner').value = '';
    document.getElementById('newTeamColor').value = '#e85d26';
    await loadSettings();
    const data = await api('/league');
    if (data.ok) { state.teams = data.teams; renderTeamBar(); loadRosterSelector(); }
  }
  setTimeout(() => { msg.textContent = ''; }, 3000);
}

async function saveTeam(teamId) {
  const name = document.getElementById(`sName-${teamId}`).value.trim();
  const owner = document.getElementById(`sOwner-${teamId}`).value.trim();
  const color = document.getElementById(`sColor-${teamId}`).value;
  const res = await api(`/teams/${teamId}`, {
    method: 'PATCH', body: JSON.stringify({ name, owner, color }),
  });
  const msg = document.getElementById(`sMsg-${teamId}`);
  msg.style.color = res.ok ? 'var(--green)' : 'var(--red)';
  msg.textContent = res.ok ? '✓ Saved' : '✗ ' + res.error;
  if (res.ok) {
    const idx = state.teams.findIndex(t => t.id === teamId);
    if (idx >= 0) { state.teams[idx].name = name; state.teams[idx].owner = owner; state.teams[idx].color = color; }
    renderTeamBar();
    loadRosterSelector();
  }
  setTimeout(() => { msg.textContent = ''; }, 3000);
}

// ============================================================
// Utility
// ============================================================
function esc(str) {
  return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// ============================================================
// Boot
// ============================================================
document.addEventListener('click', e => {
  if (!document.getElementById('teamBar').contains(e.target)) {
    document.getElementById('teamPicker').classList.add('hidden');
  }
});

init();
</script>
</body>
</html>
